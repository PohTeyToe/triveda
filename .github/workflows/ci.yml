name: CI

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - ".github/workflows/ci.yml"
      - "pnpm-lock.yaml"
  pull_request:
    branches: [main]
    paths:
      - "apps/**"
      - "packages/**"
      - ".github/workflows/ci.yml"
      - "pnpm-lock.yaml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    env:
      VITE_ENABLE_DEMO_MODE: "true"
      VITE_SUPABASE_URL: ""
      VITE_SUPABASE_ANON_KEY: ""
      VITE_API_URL: "http://localhost:3001"
      TRIVEDA_LLM_MODE: "mock"
      NODE_ENV: "test"
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (Vitest)
        run: pnpm test

      - name: Build
        run: pnpm build

  api-test:
    name: API Tests (Bun)
    runs-on: ubuntu-latest
    env:
      DEMO_MODE: "true"
      TRIVEDA_LLM_MODE: "mock"
      NODE_ENV: "test"
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: oven-sh/setup-bun@v2

      - run: pnpm install --frozen-lockfile

      - name: Run API tests
        run: bun test
        working-directory: apps/api
